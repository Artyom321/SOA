services:
  api-service:
    build:
      context: .
      dockerfile: ./api-service/DockerFile
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  user-service:
    build:
      context: .
      dockerfile: ./user-service/DockerFile
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_USER=mydbuser
      - DB_PASSWORD=password
      - DB_NAME=userdb
      - COOKIE_SECRET=my_secret_string
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_USER_TOPIC=user_registrations
      - KAFKA_VIEW_TOPIC=post_views
      - KAFKA_LIKE_TOPIC=post_likes
      - KAFKA_COMMENT_TOPIC=post_comments
    networks:
      - app-network
    depends_on:
      user-db:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  post-service:
    build:
      context: .
      dockerfile: ./post-service/DockerFile
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=post-db
      - DB_PORT=5432
      - DB_USER=mydbuser
      - DB_PASSWORD=password
      - DB_NAME=postdb
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_USER_TOPIC=user_registrations
      - KAFKA_VIEW_TOPIC=post_views
      - KAFKA_LIKE_TOPIC=post_likes
      - KAFKA_COMMENT_TOPIC=post_comments
    networks:
      - app-network
    depends_on:
      post-db:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  user-db:
    image: postgres:14
    environment:
      - POSTGRES_USER=mydbuser
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=userdb
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  post-db:
    image: postgres:14
    environment:
      - POSTGRES_USER=mydbuser
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postdb
    volumes:
      - post_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.0
    container_name: zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "echo mntr | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.0.0
    container_name: kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - app-network
    
  kafka-init:
    image: confluentinc/cp-kafka:7.0.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Creating Kafka topics...'
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic user_registrations
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic post_views
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic post_likes
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 1 --topic post_comments
        echo 'Kafka topics created.'
      "
    networks:
      - app-network

networks:
  app-network:

volumes:
  user_postgres_data:
  post_postgres_data:
